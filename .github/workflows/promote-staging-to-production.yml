name: Promote staging → production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.2.0)"
        required: false

permissions:
  contents: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Merge staging into production
        run: |
          git checkout production
          git merge --no-ff origin/staging -m "chore: merge staging to production [ci-skip]"
          git push origin production

      - name: Create version tag
        if: ${{ inputs.version != '' }}
        run: |
          git tag "${{ inputs.version }}" production
          git push origin "${{ inputs.version }}"
